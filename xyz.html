/* =====================================================
   RENDER SYLLABUS
===================================================== */

function renderSyllabus() {

    const container = document.getElementById("syllabusTree");

    container.innerHTML = "";

    let totalSubtopics = 0;

    window.rbbSyllabus.forEach(section => {

        const sectionBanner = document.createElement("div");

        sectionBanner.className = "section-title-banner";

        sectionBanner.innerHTML = `
            <div style="
                padding:15px;
                margin:20px 0 12px;
                border-radius:10px;
                background:linear-gradient(
                    135deg,
                    rgba(0,188,212,.12),
                    rgba(124,77,255,.12)
                );
                border:1px solid var(--border-blue);
            ">

                <div style="
                    color:var(--accent-blue);
                    font-size:16px;
                    font-weight:800;
                ">
                    ${section.section_title}
                </div>

                <div style="
                    color:var(--text-muted);
                    font-size:12px;
                    margin-top:5px;
                ">
                    ${section.section_marks}
                </div>

            </div>
        `;

        container.appendChild(sectionBanner);


        section.topics.forEach(topic => {

            const item = document.createElement("div");

            item.className = "accordion-item";

            let subHtml = "";

            topic.subtopics.forEach(sub => {

                totalSubtopics++;

                subHtml += `

                    <div class="topic-row">

                        <input
                            type="checkbox"
                            id="chk_${sub.id.replaceAll(".", "_")}"
                            onchange="updateProgress()"
                        >

                        <span class="topic-text">
                            <strong>${sub.id}</strong>
                            ${sub.title}
                        </span>

                        <div class="action-btns">

                            <button
                                class="view-btn"
                                onclick="openPdf(
                                    '${sub.title.replaceAll("'", "\\'")}',
                                    '${sub.pdfUrl}'
                                )"
                            >
                                📖 View Note
                            </button>

                        </div>

                    </div>

                `;
            });


            item.innerHTML = `

                <div
                    class="accordion-header"
                    onclick="toggleAccordion(this)"
                >

                    <span class="accordion-title">
                        ${topic.title}
                    </span>

                    <span class="accordion-arrow">
                        ▼
                    </span>

                </div>

                <div class="accordion-content">
                    ${subHtml}
                </div>

            `;

            container.appendChild(item);

        });

    });


    window.totalTopicsCount = totalSubtopics;

    updateProgress();

}


/* =====================================================
   ACCORDION
===================================================== */

function toggleAccordion(header) {

    const content = header.nextElementSibling;

    content.classList.toggle("open");

    if (content.classList.contains("open")) {

        content.style.maxHeight =
            content.scrollHeight + "px";

    } else {

        content.style.maxHeight = "0px";

    }

}


/* =====================================================
   PDF VIEWER
===================================================== */

function openPdf(title, url) {

    const viewer =
        document.getElementById("viewerContent");

    const panelTitle =
        document.getElementById("panelTitle");

    const sidebar =
        document.getElementById("pdfViewerSidebar");


    panelTitle.innerText = "📖 PDF Notes Reader";


    if (window.innerWidth <= 992) {

        sidebar.classList.add("active-mobile");

        document.getElementById(
            "closeMobileBtn"
        ).style.display = "inline-block";

    }


    viewer.innerHTML = `

        <div class="pdf-container">

            <div class="pdf-toolbar">

                <h3 title="${title}">
                    📚 ${title}
                </h3>

                <a
                    href="${url}"
                    target="_blank"
                    class="open-pdf-btn"
                >
                    Open Full ↗
                </a>

            </div>


            <iframe
                class="pdf-frame"
                src="${url}#toolbar=1&navpanes=0&scrollbar=1"
                type="application/pdf"
                loading="lazy"
            >

                <p>
                    Browser ले PDF support नगरेमा
                    <a href="${url}" target="_blank">
                        PDF Open गर्नुहोस्
                    </a>
                </p>

            </iframe>

        </div>

    `;

}


/* =====================================================
   PROGRESS TRACKER
===================================================== */

function updateProgress() {

    const checkboxes =
        document.querySelectorAll(
            ".topic-row input[type='checkbox']"
        );

    let checkedCount = 0;

    checkboxes.forEach(chk => {

        if (chk.checked) {
            checkedCount++;
        }

    });


    const total =
        window.totalTopicsCount || 1;


    const percentage =
        Math.round(
            (checkedCount / total) * 100
        );


    document.getElementById(
        "progPct"
    ).innerText =
        `${percentage}% Completed`;


    document.getElementById(
        "progBar"
    ).style.width =
        `${percentage}%`;


    document.getElementById(
        "trackerSummary"
    ).innerText =
        `${checkedCount} of ${total} subtopics completed.`;

}

/* =====================================================
   THEME
===================================================== */

function toggleTheme() {

    const html =
        document.documentElement;


    const currentTheme =
        html.getAttribute(
            "data-theme"
        );


    const newTheme =
        currentTheme === "dark"
            ? "light"
            : "dark";


    html.setAttribute(
        "data-theme",
        newTheme
    );


    document.getElementById(
        "themeIcon"
    ).innerText =
        newTheme === "dark"
            ? "🌙"
            : "☀️";


    document.getElementById(
        "themeText"
    ).innerText =
        newTheme === "dark"
            ? "Dark"
            : "Light";

}


/* =====================================================
   TIMER
===================================================== */

let timerInterval = null;

let totalSeconds =
    3 * 60 * 60;


function updateTimerDisplay() {

    const h =
        String(
            Math.floor(
                totalSeconds / 3600
            )
        ).padStart(2, "0");


    const m =
        String(
            Math.floor(
                (totalSeconds % 3600) / 60
            )
        ).padStart(2, "0");


    const s =
        String(
            totalSeconds % 60
        ).padStart(2, "0");


    document.getElementById(
        "timerBox"
    ).innerText =
        `${h}:${m}:${s}`;

}


function startTimer() {

    if (timerInterval) return;


    timerInterval =
        setInterval(() => {

            if (totalSeconds > 0) {

                totalSeconds--;

                updateTimerDisplay();

            } else {

                pauseTimer();

                alert(
                    "Time's up!"
                );

            }

        }, 1000);

}


function pauseTimer() {

    clearInterval(
        timerInterval
    );

    timerInterval =
        null;

}


function applyCustomTime() {

    pauseTimer();


    const h =
        parseInt(
            document.getElementById(
                "hrIn"
            ).value
        ) || 0;


    const m =
        parseInt(
            document.getElementById(
                "minIn"
            ).value
        ) || 0;


    totalSeconds =
        (h * 3600)
        +
        (m * 60);


    updateTimerDisplay();

}


/* =====================================================
   INITIALIZE
===================================================== */

window.onload = () => {

    renderSyllabus();

    updateTimerDisplay();

};
