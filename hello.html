<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant Realtime Sheets OCR</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .new-row-animation { animation: slideIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans">

    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-bold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">
                <i class="fa-solid fa-bolt mr-2"></i>Instant Live Sheets OCR
            </h1>
            <p class="text-slate-400 mt-2 text-sm">Data entry syncs to UI and Google Sheets instantly like Facebook</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-slate-900 border border-slate-800 rounded-xl p-6 shadow-xl">
                    <h2 class="text-xl font-semibold mb-4 text-cyan-400 flex items-center gap-2">
                        <i class="fa-solid fa-camera"></i> Scan Camera
                    </h2>
                    
                    <label class="flex flex-col items-center justify-center w-full h-48 border-2 border-slate-700 border-dashed rounded-lg cursor-pointer bg-slate-950 hover:border-cyan-500 transition-colors text-center px-4">
                        <i class="fa-solid fa-id-card text-4xl text-slate-500 mb-2"></i>
                        <span class="text-sm font-semibold text-slate-300">Take Photo / Upload ID</span>
                        <input id="imageUpload" type="file" accept="image/*" class="hidden" />
                    </label>

                    <div id="previewContainer" class="mt-4 hidden">
                        <p class="text-xs font-semibold text-slate-500 mb-1 uppercase">Captured Frame:</p>
                        <img id="imagePreview" src="" class="rounded-lg border border-slate-800 max-h-48 w-full object-contain bg-black">
                    </div>

                    <div id="statusContainer" class="mt-4 hidden bg-slate-950 p-3 border border-slate-800 rounded-lg">
                        <div class="flex justify-between text-xs font-medium mb-1">
                            <span id="statusText" class="text-slate-300">Reading card...</span>
                            <span id="progressPercent" class="text-cyan-400">0%</span>
                        </div>
                        <div class="w-full bg-slate-800 rounded-full h-1.5">
                            <div id="progressBar" class="bg-cyan-500 h-1.5 rounded-full transition-all duration-200" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div class="bg-slate-900 border border-slate-800 rounded-xl p-6 shadow-xl">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-semibold text-blue-400"><i class="fa-solid fa-globe"></i> Live Feed Activity</h2>
                        <span class="text-xs text-slate-500 flex items-center gap-1.5">
                            <span class="h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></span> Streaming Connected
                        </span>
                    </div>

                    <div class="overflow-x-auto border border-slate-800 rounded-lg bg-slate-950">
                        <table class="w-full text-sm text-left">
                            <thead class="text-xs uppercase bg-slate-900 text-slate-400 border-b border-slate-800">
                                <tr>
                                    <th class="px-4 py-3">School</th>
                                    <th class="px-4 py-3">Student Name</th>
                                    <th class="px-4 py-3">Details</th>
                                    <th class="px-4 py-3">Contact</th>
                                    <th class="px-4 py-3 text-right">Status</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody" class="divide-y divide-slate-800/60">
                                <tr id="loadingRow">
                                    <td colspan="5" class="px-4 py-8 text-center text-slate-500">Loading active database rows...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE EXACTLY
  // REPLACE THIS URL WITH YOUR DEPLOYED GOOGLE APPS SCRIPT WEB APP URL
        const SHEET_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbycpsz4VgsjEg5jO4aB1erdOLu0HlqDIwUNQhLZDdqKE0h-8EMcChN6g_x-PTkysqQmvQ/exec";

        let scannedRecords = [];

        const imageUpload = document.getElementById('imageUpload');
        const previewContainer = document.getElementById('previewContainer');
        const imagePreview = document.getElementById('imagePreview');
        const statusContainer = document.getElementById('statusContainer');
        const statusText = document.getElementById('statusText');
        const progressPercent = document.getElementById('progressPercent');
        const progressBar = document.getElementById('progressBar');
        const tableBody = document.getElementById('tableBody');

        document.addEventListener('DOMContentLoaded', () => {
            fetchInitialData();
            imageUpload.addEventListener('change', handleFileSelect);
        });

        // Pulls database records once at initial startup
        async function fetchInitialData() {
            if (!SHEET_WEBAPP_URL || SHEET_WEBAPP_URL.includes("YOUR_GOOGLE_APPS_SCRIPT")) {
                tableBody.innerHTML = `<tr><td colspan="5" class="px-4 py-8 text-center text-rose-400 font-bold">Error: Enter Web App URL on line 79!</td></tr>`;
                return;
            }
            try {
                const res = await fetch(SHEET_WEBAPP_URL);
                const result = await res.json();
                if (result.status === "success") {
                    scannedRecords = result.data || [];
                    renderTable();
                }
            } catch (err) {
                tableBody.innerHTML = `<tr><td colspan="5" class="px-4 py-8 text-center text-rose-500">Database offline. Check your script deployment options.</td></tr>`;
            }
        }

        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (!file) return;

            imagePreview.src = URL.createObjectURL(file);
            previewContainer.classList.remove('hidden');
            
            runOCR(file);
        }

        async function runOCR(file) {
            statusContainer.classList.remove('hidden');
            updateProgress('Scanning text vectors...', 20);

            try {
                const worker = await Tesseract.createWorker('eng', 1, {
                    logger: m => {
                        if(m.status === 'recognizing') {
                            const progress = Math.floor(m.progress * 100);
                            updateProgress('Running Local Engine...', progress);
                        }
                    }
                });

                const response = await worker.recognize(file);
                const textDump = response.data.text;
                
                updateProgress('Structuring text segments...', 90);
                const structuredData = parseTextHeuristics(textDump);
                
                // 🚀 FB-LIKE REALTIME INJECTION (Optimistic UI Update)
                // Add the record directly into the local state array instantly
                scannedRecords.unshift(structuredData);
                renderTable(); // Re-render instantly so it pops on screen immediately
                
                statusContainer.classList.add('hidden');
                imageUpload.value = '';
                await worker.terminate();

                // Fire database request in background right away
                await sendToGoogleSheets(structuredData);

            } catch (err) {
                console.error(err);
                alert("OCR crashed or image read error.");
                statusContainer.classList.add('hidden');
            }
        }

        function updateProgress(msg, percent) {
            statusText.innerText = msg;
            progressPercent.innerText = percent + '%';
            progressBar.style.width = percent + '%';
        }

        function parseTextHeuristics(rawText) {
            const lines = rawText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            
            const record = {
                action: "insert",
                id: "id_" + Date.now(),
                school: "Unknown Institution",
                name: "Not Found",
                classLevel: "N/A",
                roll: "N/A",
                section: "N/A",
                guardian: "Not Found",
                contact: "N/A",
                validUpto: "N/A",
                isPending: true // Marker indicating network background write is active
            };

            if(lines.length > 0) record.school = lines[0].replace(/[^a-zA-Z0-9\s.,]/g, '');

            lines.forEach(line => {
                const clean = line.replace(/[:\-–—]/g, ' ').replace(/\s+/g, ' ').trim();
                const lowered = clean.toLowerCase();

                if (lowered.includes('name') || lowered.includes('student') || lowered.includes('st.')) {
                    const match = clean.match(/(?:name|student|st|sn)\s+(.*)/i);
                    if (match && match[1]) record.name = match[1].trim();
                }
                if (lowered.includes('class') || lowered.includes('std')) {
                    const match = clean.match(/(?:class|std)\s+([a-zA-Z0-9]+)/i);
                    if (match && match[1]) record.classLevel = match[1].trim();
                }
                if (lowered.includes('roll') || lowered.includes('no.')) {
                    const match = clean.match(/(?:roll|no)\s+([a-zA-Z0-9]+)/i);
                    if (match && match[1]) record.roll = match[1].trim().replace(/[lI|]/g, '1');
                }
                if (lowered.includes('sec') || lowered.includes('section')) {
                    const match = clean.match(/(?:sec|section)\s+([a-zA-Z0-9]+)/i);
                    if (match && match[1]) record.section = match[1].trim();
                }
                
                const phoneMatch = clean.match(/\b(98|97|96)\d{8}\b/);
                if (phoneMatch) record.contact = phoneMatch[0];
            });

            if (record.name === "Not Found" && lines.length > 1) {
                for (let i = 1; i < Math.min(4, lines.length); i++) {
                    if (!lines[i].includes(':') && lines[i].length > 4 && !lines[i].toLowerCase().includes('card')) {
                        record.name = lines[i].trim();
                        break;
                    }
                }
            }
            return record;
        }

        // Direct async background pipeline push
        async function sendToGoogleSheets(payload) {
            try {
                await fetch(SHEET_WEBAPP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                // 🚀 Sync state change: sheet save completed!
                const completeRecord = scannedRecords.find(r => r.id === payload.id);
                if(completeRecord) {
                    delete completeRecord.isPending; // Remove spinner marker
                    renderTable(); // Instant background update state swap
                }
            } catch (err) {
                console.error("Sheets sync background error: ", err);
            }
        }

        function renderTable() {
            tableBody.innerHTML = '';
            if(scannedRecords.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="5" class="px-4 py-8 text-center text-slate-500">Scan an ID to stream into this dataset workspace.</td></tr>`;
                return;
            }

            scannedRecords.forEach((rec, index) => {
                const tr = document.createElement('tr');
                
                // Apply a slick enter animation if it's the freshly scanned row
                tr.className = `border-b border-slate-800/40 text-xs sm:text-sm transition-colors hover:bg-slate-900 ${index === 0 ? 'new-row-animation bg-slate-900/30' : ''}`;
                
                // Switch icon badge dynamically based on pending status flags
                const statusBadge = rec.isPending 
                    ? `<span class="text-[10px] uppercase text-amber-400 font-bold bg-amber-950/40 border border-amber-900 px-1.5 py-0.5 rounded flex items-center gap-1 w-fit ml-auto"><i class="fa-solid fa-circle-notch animate-spin text-[9px]"></i> Syncing</span>`
                    : `<span class="text-[10px] uppercase text-emerald-500 font-bold bg-emerald-950/50 border border-emerald-900 px-1.5 py-0.5 rounded flex items-center gap-1 w-fit ml-auto"><i class="fa-solid fa-circle-check text-[9px]"></i> Saved</span>`;

                tr.innerHTML = `
                    <td class="px-4 py-3 text-slate-300 truncate max-w-[140px]">${escapeHTML(rec.school)}</td>
                    <td class="px-4 py-3 font-semibold text-cyan-400">${escapeHTML(rec.name)}</td>
                    <td class="px-4 py-3 text-slate-400">Cls: ${escapeHTML(rec.classLevel)} | R: ${escapeHTML(rec.roll)} | S: ${escapeHTML(rec.section)}</td>
                    <td class="px-4 py-3 font-mono text-slate-400">${escapeHTML(rec.contact)}</td>
                    <td class="px-4 py-3 text-right">${statusBadge}</td>
                `;
                tableBody.appendChild(tr);
            });
        }

        function escapeHTML(str) {
            return str ? str.replace(/[&<>'"]/g, t => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[t] || t)) : '';
        }
    </script>
</body>
</html>
