<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High Accuracy Cloud ID OCR</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.25s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans antialiased">

    <div class="container mx-auto px-4 py-8 max-w-7xl">
        <header class="text-center mb-10">
            <h1 class="text-3xl md:text-4xl font-bold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-emerald-500">
                <i class="fa-solid fa-wand-magic-sparkles mr-2"></i>Enhanced Accuracy ID OCR
            </h1>
            <p class="text-slate-400 mt-2 text-sm">Powered by Gemini 2.5 Flash Multimodal Engine</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-slate-900 border border-slate-800 rounded-xl p-6 shadow-xl">
                    <h2 class="text-xl font-semibold mb-4 flex items-center gap-2 text-cyan-400">
                        <i class="fa-solid fa-camera"></i> Scan Capture
                    </h2>
                    
                    <label for="imageUpload" class="flex flex-col items-center justify-center w-full h-52 border-2 border-slate-700 border-dashed rounded-lg cursor-pointer bg-slate-950 hover:bg-slate-900/50 hover:border-cyan-500 transition-colors group relative">
                        <div class="flex flex-col items-center justify-center pt-5 pb-6 text-center px-4">
                            <i class="fa-solid fa-id-card text-4xl text-slate-500 group-hover:text-cyan-400 mb-3 transition-colors"></i>
                            <p class="mb-2 text-sm text-slate-300"><span class="font-semibold">Capture ID Card</span></p>
                            <p class="text-xs text-slate-500">Direct Multimodal API extraction</p>
                        </div>
                        <input id="imageUpload" type="file" accept="image/*" class="hidden" />
                    </label>

                    <div id="previewContainer" class="mt-5 hidden animate-fade-in">
                        <p class="text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Image Preview</p>
                        <div class="relative rounded-lg overflow-hidden border border-slate-800 max-h-60 flex justify-center bg-black">
                            <img id="previewImage" class="object-contain max-h-60 w-full" src="" alt="ID Preview" />
                        </div>
                    </div>

                    <div id="statusContainer" class="mt-6 hidden">
                        <div class="flex justify-between mb-2 text-xs font-medium text-slate-400">
                            <span id="statusText" class="flex items-center gap-2">
                                <i class="fa-solid fa-circle-notch animate-spin text-cyan-400"></i> Running deep semantic scan...
                            </span>
                            <span id="progressPercent">0%</span>
                        </div>
                        <div class="w-full bg-slate-800 rounded-full h-2">
                            <div id="progressBar" class="bg-gradient-to-r from-cyan-500 to-emerald-500 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div class="bg-slate-900 border border-slate-800 rounded-xl p-6 shadow-xl">
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
                        <h2 class="text-xl font-semibold flex items-center gap-2 text-emerald-400">
                            <i class="fa-solid fa-table-list"></i> Sheet Sync Datatable
                        </h2>
                        <div class="flex items-center gap-3 w-full sm:w-auto">
                            <div class="relative flex-1 sm:w-64">
                                <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-slate-500">
                                    <i class="fa-solid fa-magnifying-glass text-sm"></i>
                                </span>
                                <input type="text" id="searchInput" placeholder="Search records..." class="w-full pl-9 pr-4 py-1.5 bg-slate-950 border border-slate-800 rounded-lg text-sm text-slate-100 focus:outline-none focus:border-cyan-500 transition-colors">
                            </div>
                            <button id="refreshBtn" class="flex items-center gap-2 px-4 py-1.5 bg-slate-800 hover:bg-slate-700 border border-slate-700 text-white rounded-lg text-sm font-medium transition-colors cursor-pointer">
                                <i class="fa-solid fa-arrows-rotate"></i> Sync
                            </button>
                        </div>
                    </div>

                    <div class="overflow-x-auto border border-slate-800 rounded-lg bg-slate-950">
                        <table class="w-full text-sm text-left text-slate-300">
                            <thead class="text-xs uppercase bg-slate-900 text-slate-400 border-b border-slate-800">
                                <tr>
                                    <th class="px-4 py-3">School/Institution</th>
                                    <th class="px-4 py-3">Student Name</th>
                                    <th class="px-4 py-3">Class/Roll/Sec</th>
                                    <th class="px-4 py-3">Guardian & Contact</th>
                                    <th class="px-4 py-3">Valid Until</th>
                                    <th class="px-4 py-3 text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody" class="divide-y divide-slate-800/50">
                                <tr id="emptyStateRow">
                                    <td colspan="6" class="px-4 py-12 text-center text-slate-500">
                                        <i class="fa-solid fa-arrows-spin text-4xl mb-3 block text-slate-600 animate-spin"></i>
                                        Connecting to Cloud ecosystem...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Modal Framework -->
    <div id="editModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/70 backdrop-blur-xs hidden">
        <div class="bg-slate-900 border border-slate-800 rounded-xl w-full max-w-lg p-6 shadow-2xl animate-fade-in">
            <div class="flex justify-between items-center mb-4 border-b border-slate-800 pb-3">
                <h3 class="text-lg font-semibold text-cyan-400"><i class="fa-solid fa-pen-to-square mr-2"></i>Verify Profile</h3>
                <button id="closeModalBtn" class="text-slate-400 hover:text-slate-200 text-xl cursor-pointer">&times;</button>
            </div>
            <form id="editForm" class="space-y-4">
                <input type="hidden" id="editId">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">School / Institution</label>
                    <input type="text" id="editSchool" class="w-full p-2 bg-slate-950 border border-slate-800 rounded-lg text-slate-100 focus:outline-none focus:border-cyan-500 text-sm">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Student Name</label>
                        <input type="text" id="editName" class="w-full p-2 bg-slate-950 border border-slate-800 rounded-lg text-slate-100 focus:outline-none focus:border-cyan-500 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Class Level</label>
                        <input type="text" id="editClass" class="w-full p-2 bg-slate-950 border border-slate-800 rounded-lg text-slate-100 focus:outline-none focus:border-cyan-500 text-sm">
                    </div>
                </div>
                <div class="grid grid-cols-3 gap-4">
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Roll No</label>
                        <input type="text" id="editRoll" class="w-full p-2 bg-slate-950 border border-slate-800 rounded-lg text-slate-100 focus:outline-none focus:border-cyan-500 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Section</label>
                        <input type="text" id="editSection" class="w-full p-2 bg-slate-950 border border-slate-800 rounded-lg text-slate-100 focus:outline-none focus:border-cyan-500 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Valid Upto</label>
                        <input type="text" id="editValid" class="w-full p-2 bg-slate-950 border border-slate-800 rounded-lg text-slate-100 focus:outline-none focus:border-cyan-500 text-sm">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Guardian / Parent</label>
                        <input type="text" id="editGuardian" class="w-full p-2 bg-slate-950 border border-slate-800 rounded-lg text-slate-100 focus:outline-none focus:border-cyan-500 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Contact No</label>
                        <input type="text" id="editContact" class="w-full p-2 bg-slate-950 border border-slate-800 rounded-lg text-slate-100 focus:outline-none focus:border-cyan-500 text-sm">
                    </div>
                </div>
                <div class="flex justify-end gap-3 pt-4 border-t border-slate-800">
                    <button type="button" id="cancelModalBtn" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg text-sm font-medium transition-colors cursor-pointer">Discard</button>
                    <button type="submit" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 text-white rounded-lg text-sm font-medium transition-colors cursor-pointer">Save to Cloud</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // 1. Paste your Free Google AI Studio API Key here
        const GEMINI_API_KEY = "YOUR_FREE_GEMINI_API_KEY"; 
        const MODEL_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`;
        const SHEET_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbycpsz4VgsjEg5jO4aB1erdOLu0HlqDIwUNQhLZDdqKE0h-8EMcChN6g_x-PTkysqQmvQ/exec";

        let scannedRecords = [];

        const imageUpload = document.getElementById('imageUpload');
        const previewContainer = document.getElementById('previewContainer');
        const previewImage = document.getElementById('previewImage');
        const statusContainer = document.getElementById('statusContainer');
        const statusText = document.getElementById('statusText');
        const progressPercent = document.getElementById('progressPercent');
        const progressBar = document.getElementById('progressBar');
        const tableBody = document.getElementById('tableBody');
        const searchInput = document.getElementById('searchInput');
        const refreshBtn = document.getElementById('refreshBtn');
        const editModal = document.getElementById('editModal');
        const editForm = document.getElementById('editForm');

        document.addEventListener('DOMContentLoaded', () => {
            fetchCloudData();
            imageUpload.addEventListener('change', handleImageSelection);
            refreshBtn.addEventListener('click', fetchCloudData);
            document.getElementById('closeModalBtn').addEventListener('click', hideModal);
            document.getElementById('cancelModalBtn').addEventListener('click', hideModal);
            editForm.addEventListener('submit', commitRecordEdits);
        });

        function updateProgress(message, percentage) {
            statusText.innerHTML = `<i class="fa-solid fa-circle-notch animate-spin text-cyan-400"></i> ${message}`;
            progressPercent.innerText = `${percentage}%`;
            progressBar.style.width = `${percentage}%`;
        }

        function handleImageSelection(e) {
            const file = e.target.files[0];
            if (!file) return;

            statusContainer.classList.remove('hidden');
            updateProgress('Reading image payload...', 20);

            const reader = new FileReader();
            reader.onload = async function(event) {
                // Show standard preview inside UI framework
                previewImage.src = event.target.result;
                previewContainer.classList.remove('hidden');

                updateProgress('Transmitting array to Gemini...', 45);
                
                // Fire off multimodal payload optimization frame
                const result = await scanImageWithGemini(event.target.result);
                
                if(result) {
                    updateProgress('Syncing cloud database...', 90);
                    result.action = "insert";
                    await sendToCloud(result);
                } else {
                    alert("OCR processing frame failed to execute clean text structures.");
                }

                statusContainer.classList.add('hidden');
                imageUpload.value = ''; 
            };
            reader.readAsDataURL(file);
        }

        async function scanImageWithGemini(base64ImageWithHeader) {
            const base64Data = base64ImageWithHeader.split(',')[1];
            const mimeType = base64ImageWithHeader.split(',')[0].split(':')[1].split(';')[0];

            const payload = {
                contents: [{
                    parts: [
                        { text: "Extract text from this ID Card. Return the data ONLY as a valid JSON object with these exact keys: school, name, classLevel, roll, section, guardian, contact, validUpto. If a field is missing or unreadable, set its value to 'N/A'. Do not include markdown code blocks or wrapper backticks." },
                        {
                            inlineData: {
                                mimeType: mimeType,
                                data: base64Data
                            }
                        }
                    ]
                }]
            };

            try {
                const response = await fetch(MODEL_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                const json = await response.json();
                const rawTextResponse = json.candidates[0].content.parts[0].text;
                
                // Structural normalization of string parameters
                const cleanJsonText = rawTextResponse.replace(/```json/g, "").replace(/```/g, "").trim();
                const parsedData = JSON.parse(cleanJsonText);
                
                // Add runtime primary layout key required by Cloud Schema
                parsedData.id = 'rec_' + Date.now();
                
                console.log("Highly Accurate Result:", parsedData);
                return parsedData;

            } catch (error) {
                console.error("Gemini Parsing Framework Error:", error);
                return null;
            }
        }

        async function fetchCloudData() {
            if(SHEET_WEBAPP_URL === "https://script.google.com/macros/s/AKfycbycpsz4VgsjEg5jO4aB1erdOLu0HlqDIwUNQhLZDdqKE0h-8EMcChN6g_x-PTkysqQmvQ/exec") {
                tableBody.innerHTML = `<tr><td colspan="6" class="px-4 py-12 text-center text-amber-500"><i class="fa-solid fa-triangle-exclamation text-3xl mb-2 block"></i>Missing Web App URL!</td></tr>`;
                return;
            }
            try {
                const response = await fetch(SHEET_WEBAPP_URL);
                const json = await response.json();
                if(json.status === "success") {
                    scannedRecords = json.data || [];
                    renderTable(scannedRecords);
                }
            } catch (err) {
                tableBody.innerHTML = `<tr><td colspan="6" class="px-4 py-12 text-center text-rose-500">Connection error syncing database.</td></tr>`;
            }
        }

        async function sendToCloud(payload) {
            try {
                await fetch(SHEET_WEBAPP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                setTimeout(fetchCloudData, 1500);
            } catch (err) {
                console.error(err);
            }
        }

        function renderTable(dataset) {
            tableBody.innerHTML = '';
            if (dataset.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="6" class="px-4 py-12 text-center text-slate-500"><i class="fa-solid fa-folder-open text-3xl mb-2 block"></i>No cloud indices found.</td></tr>`;
                return;
            }
            dataset.forEach(record => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-slate-900/40 transition-colors animate-fade-in text-sm';
                tr.innerHTML = `
                    <td class="px-4 py-3.5 font-medium max-w-[150px] truncate">${escapeHTML(record.school)}</td>
                    <td class="px-4 py-3.5 text-cyan-400 font-semibold">${escapeHTML(record.name)}</td>
                    <td class="px-4 py-3.5">Cls: <strong>${escapeHTML(record.classLevel)}</strong> <span class="text-xs text-slate-500">| R: ${escapeHTML(record.roll)} | S: ${escapeHTML(record.section)}</span></td>
                    <td class="px-4 py-3.5 text-xs"><div>G: ${escapeHTML(record.guardian)}</div><div class="text-slate-500"><i class="fa-solid fa-phone text-[10px]"></i> ${escapeHTML(record.contact)}</div></td>
                    <td class="px-4 py-3.5"><span class="px-2 py-0.5 bg-slate-800 text-slate-400 rounded text-xs">${escapeHTML(record.validUpto)}</span></td>
                    <td class="px-4 py-3.5 text-right space-x-1">
                        <button onclick="displayEditModal('${record.id}')" class="p-1.5 bg-slate-800 hover:bg-cyan-900/40 text-slate-400 hover:text-cyan-400 rounded transition-colors cursor-pointer"><i class="fa-solid fa-user-pen text-xs"></i></button>
                    </td>
                `;
                tableBody.appendChild(tr);
            });
        }

        window.displayEditModal = function(id) {
            const target = scannedRecords.find(r => r.id === id);
            if (!target) return;
            document.getElementById('editId').value = target.id;
            document.getElementById('editSchool').value = target.school;
            document.getElementById('editName').value = target.name;
            document.getElementById('editClass').value = target.classLevel;
            document.getElementById('editRoll').value = target.roll;
            document.getElementById('editSection').value = target.section;
            document.getElementById('editGuardian').value = target.guardian;
            document.getElementById('editContact').value = target.contact;
            document.getElementById('editValid').value = target.validUpto;
            editModal.classList.remove('hidden');
        };

        function hideModal() { editModal.classList.add('hidden'); editForm.reset(); }

        async function commitRecordEdits(e) {
            e.preventDefault();
            const updatePayload = {
                action: "update",
                id: document.getElementById('editId').value,
                school: document.getElementById('editSchool').value.trim(),
                name: document.getElementById('editName').value.trim(),
                classLevel: document.getElementById('editClass').value.trim(),
                roll: document.getElementById('editRoll').value.trim(),
                section: document.getElementById('editSection').value.trim(),
                guardian: document.getElementById('editGuardian').value.trim(),
                contact: document.getElementById('editContact').value.trim(),
                validUpto: document.getElementById('editValid').value.trim()
            };
            hideModal();
            tableBody.innerHTML = `<tr><td colspan="6" class="px-4 py-12 text-center text-slate-500"><i class="fa-solid fa-arrows-spin text-4xl mb-3 block text-slate-600 animate-spin"></i>Writing verification edits back to Google Sheets...</td></tr>`;
            await sendToCloud(updatePayload);
        }

        function escapeHTML(str) { return str ? str.replace(/[&<>'"]/g, t => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[t] || t)) : ''; }
    </script>
</body>
</html>
