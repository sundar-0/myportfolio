<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Class 12 CS Full Syllabus Notes</title>
<style>
:root{  
  --bg:#0f172a;  
  --card:#1e293b;  
  --text:#e2e8f0;  
  --accent:#38bdf8;  
  --line:rgba(148,163,184,.25);
  --pdf-btn:#ef4444;
}
body.light{  
  --bg:#f8fafc;  
  --card:#ffffff;  
  --text:#0f172a;  
  --accent:#0284c7;
  --pdf-btn:#dc2626;
}
*{box-sizing:border-box}
body{  
  margin:0;  
  font-family:Segoe UI, Arial, sans-serif;  
  background:var(--bg);  
  color:var(--text);
}
.topbar{  
  display:flex;  
  position:fixed;  
  top:0;left:0;  
  width:100%;  
  height:65px;  
  background:var(--card);  
  z-index:1000;  
  padding:10px 18px;  
  align-items:center;  
  justify-content:space-between;  
  border-bottom: 1px solid var(--line);
}
button{  
  font-family:inherit;
}
.topbar button,.mode-btn{  
  border:none;  
  background:var(--accent);  
  color:#000;  
  padding:10px 14px;  
  border-radius:12px;  
  cursor:pointer;  
  font-weight:bold;
}
.sidebar{  
  width:270px;  
  height:calc(100vh - 65px);  
  top:65px;  
  background:var(--card);  
  padding:15px;  
  position:fixed;  
  overflow:auto;  
  transition:.3s;  
  z-index:999;
}
.sidebar h2{  
  color:var(--accent);  
  text-align:center;
}
.sidebar button{  
  width:100%;  
  padding:12px;  
  margin:5px 0;  
  border:none;  
  cursor:pointer;  
  background:transparent;  
  color:var(--text);  
  text-align:left;  
  border-radius:8px;  
  font-size:15px;
}
.sidebar button:hover,.sidebar button.active{  
  background:var(--accent);  
  color:#000;}
.main{  
  margin-left:280px;  
  padding:90px 25px 25px;  
  min-height:100vh;
}
.card{  
  background:var(--card);  
  padding:22px;  
  border-radius:18px;  
  box-shadow:0 5px 20px rgba(0,0,0,.2);
}
.hidden{display:none}
h3{  
  color:var(--accent);  
  font-size:28px;
}
.topic{  
  padding:15px;  
  margin:12px 0;  
  border-radius:14px;  
  border:1px solid var(--line);  
  cursor:pointer;  
  transition:.25s;
}
.topic:hover{  
  background:rgba(56,189,248,.12);  
  transform:translateY(-2px);
}
.topic-title{  
  font-size:18px;  
  font-weight:600;
}
.topic-detail{  
  display:none;  
  margin-top:12px;  
  line-height:1.7;  
  background:rgba(15,23,42,.25);  
  padding:14px;  
  border-radius:12px;  
}
body.light .topic-detail{  
  background:#f1f5f9;
}
.topic.open{  
  border-color:var(--accent);  
  background:rgba(56,189,248,.10);
}
.topic.open .topic-detail{  
  display:block;
}
.timer-box {  
  background: rgba(56,189,248,0.15);  
  padding: 6px 14px;  
  border-radius: 20px;  
  font-weight: bold;  
  color: var(--accent);  
  border: 1px solid var(--accent);  
  font-size: 16px;
}

/* PDF Section Styling */
.pdf-section {
  margin-top: 15px;
  border-top: 1px dashed var(--line);
  padding-top: 15px;
}
.pdf-btn {
  background: var(--pdf-btn);
  color: #fff;
  border: none;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
  font-size: 13px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.pdf-btn:hover {
  opacity: 0.9;
}
.ai-status-msg {
  font-size: 13px;
  color: var(--accent);
  margin-bottom: 10px;
  display: block;
}
.ai-fetched-content {
  margin-top: 15px;
  padding: 15px;
  border-top: 1px solid var(--line);
  font-size: 15px;
}
.ai-fetched-content table {
  width: 100%;
  border-collapse: collapse;
  margin: 10px 0;
}
.ai-fetched-content th, .ai-fetched-content td {
  border: 1px solid var(--line);
  padding: 8px;
  text-align: left;
}
.ai-fetched-content svg {
  background: white;
  padding: 10px;
  border-radius: 6px;
  max-width: 100%;
  height: auto;
  display: block;
  margin: 10px auto;
}

/* Printing Optimization for clean PDF rendering */
@media print {
  body { background: white; color: black; }
  .topbar, .sidebar, .pdf-section, .topic-title, img { display: none !important; }
  .main { margin-left: 0; padding: 0; }
  .card { box-shadow: none; padding: 0; }
  .topic { border: none; padding: 0; background: none !important; }
  .topic-detail { display: block !important; background: none !important; padding: 0; }
  .ai-fetched-content { border: none; padding: 0; }
}

@media(max-width:768px){  
  .sidebar{ left:-280px; }  
  .sidebar.show{left:0}  
  .main{ margin-left:0; padding:90px 14px 20px; }  
  .card{padding:18px}  
  h3{font-size:24px}  
  .topic-title{font-size:17px}
}
</style>
</head>

function loadTopics(){  
  for(let unit in syllabus){    
    let container = document.getElementById(unit);    
    if (container) {      
      syllabus[unit].forEach((item, index)=>{        
        container.innerHTML += `        
        <div class="topic" onclick="openTopic(this, event, '${item[0]}')">          
          <div class="topic-title">${item[0]}</div>          
          <div class="topic-detail">
            <div class="static-data">${item[1]}</div>
            <div class="pdf-section">
              <span class="ai-status-msg">⌛ Loading additional AI insights...</span>
              <button class="pdf-btn hidden" onclick="generatePDF(this, event)">📄 Download Notes as PDF</button>
              <div class="ai-fetched-content hidden"></div>
            </div>
          </div>        
        </div>`;      
      });    
    }  
  }
}

function show(n){  
  document.querySelectorAll(".unit").forEach(u=>{    
    u.classList.add("hidden");    
    if(u.dataset.unit == n) u.classList.remove("hidden");  
  });

  let btns=document.querySelectorAll(".sidebar button");  
  btns.forEach(b=>b.classList.remove("active"));  
  const navButtons = Array.from(document.querySelectorAll("#sidebar button")).filter(b => !b.classList.contains('mode-btn'));  
  if(navButtons[n-1]) navButtons[n-1].classList.add("active");

  document.getElementById("sidebar").classList.remove("show");
}

function toggleSidebar(){  
  document.getElementById("sidebar").classList.toggle("show");
}

function toggleMode(){  
  document.body.classList.toggle("light");  
  localStorage.setItem("theme", document.body.classList.contains("light") ? "light" : "dark");
}

// Automatically triggers AI pipeline when a topic card is opened
async function openTopic(element, event, topicTitle){  
  if (event.target.closest('.pdf-section')) {
    return;
  }
  
  let topics = element.parentElement.querySelectorAll(".topic");  
  topics.forEach(t=>{    
    if(t !== element) t.classList.remove("open");  
  });  
  
  element.classList.toggle("open");

  // If opening, fetch deep notes from AI automatically
  if(element.classList.contains("open")) {
     const statusMsg = element.querySelector(".ai-status-msg");
     const pdfBtn = element.querySelector(".pdf-btn");
     const aiContentBox = element.querySelector(".ai-fetched-content");
     
     // Only pull if not cached/fetched already
     if(aiContentBox.innerHTML === "") {
        try {
          const response = await fetch(BACKEND_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ topic: topicTitle })
          });
          
          const data = await response.json();
          if(data.html) {
             aiContentBox.innerHTML = data.html;
             statusMsg.style.display = "none";
             pdfBtn.classList.remove("hidden");
             aiContentBox.classList.remove("hidden");
          } else {
             statusMsg.innerText = "❌ AI Sync error.";
          }
        } catch (err) {
           statusMsg.innerText = "⚠️ Server offline. Static contents only.";
        }
     }
  }
}

// Convert Topic viewport structural elements directly into PDF print view
function generatePDF(btnElement, event) {
  event.stopPropagation();
  
  // Isolate the open topic block
  const targetTopic = btnElement.closest('.topic');
  const originalBody = document.body.innerHTML;
  
  // Structure a printable version containing only the topic content
  const printContents = targetTopic.querySelector('.topic-detail').innerHTML;
  
  // Open browser native print system (Saved directly to device PDF engine)
  const originalContent = document.body.innerHTML;
  document.body.innerHTML = `<div style="padding:30px; font-family:Arial;">${printContents}</div>`;
  window.print();
  
  // Restore dashboard state immediately after closing print engine
  document.body.innerHTML = originalContent;
  window.location.reload(); // Reload context state
}

// --- 35 Minutes Persistent Timer with Beep Sound ---
function initTimer() {  
  const TIMER_DURATION = 35 * 60 * 1000; 
  let endTime = localStorage.getItem("timer_end_time");

  if (!endTime) {    
    endTime = Date.now() + TIMER_DURATION;    
    localStorage.setItem("timer_end_time", endTime);  
  } else {    
    endTime = parseInt(endTime, 10);  
  }

  const timerDisplay = document.getElementById("timer-display");

  function updateTimer() {    
    let now = Date.now();    
    let timeLeft = endTime - now;

    if (timeLeft <= 0) {      
      timerDisplay.innerHTML = "⏱️ Time's Up!";      
      playBeepSound();      
      alert("35 मिनेट पूरा भयो, भाइ! बिश्राम लेऊ वा अर्को सेसन सुरु गर।");      
      endTime = Date.now() + TIMER_DURATION;      
      localStorage.setItem("timer_end_time", endTime);      
      return;    
    }

    let minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));    
    let seconds = Math.floor((timeLeft % (1000 * 60)) / 1000);

    minutes = minutes < 10 ? "0" + minutes : minutes;    
    seconds = seconds < 10 ? "0" + seconds : seconds;

    timerDisplay.innerHTML = `⏱️ ${minutes}:${seconds}`;  
  }

  updateTimer();  
  setInterval(updateTimer, 1000);
}

const beepSound = new Audio("Audio/beep.m4a"); 
beepSound.preload = "auto";
beepSound.volume = 1.0;

function playBeepSound() {    
  try {        
    beepSound.pause();          
    beepSound.currentTime = 0;  
    beepSound.play().catch(err => {            
      console.log("Audio play failed:", err);        
    });    
  } catch (e) {        
    console.log("Audio error:", e);    
  }
}

window.onload=function(){  
  loadTopics();  
  if(localStorage.getItem("theme")==="light"){    
    document.body.classList.add("light");  
  }  
  initTimer(); 
}
</script>
