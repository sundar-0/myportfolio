function loadTopics(){
  for(let unit in syllabus){
    let container = document.getElementById(unit);
    if (container) {
      syllabus[unit].forEach(item=>{
        container.innerHTML += `
        <div class="topic" onclick="openTopic(this)">
          <div class="topic-title">${item[0]}</div>
          <div class="topic-detail">${item[1]}</div>
        </div>`;
      });
    }
  }
}

function show(n){
  document.querySelectorAll(".unit").forEach(u=>{
    u.classList.add("hidden");
    if(u.dataset.unit == n) u.classList.remove("hidden");
  });

  let btns=document.querySelectorAll(".sidebar button");
  btns.forEach(b=>b.classList.remove("active"));
  const navButtons = Array.from(document.querySelectorAll("#sidebar button")).filter(b => !b.classList.contains('mode-btn'));
  if(navButtons[n-1]) navButtons[n-1].classList.add("active");

  document.getElementById("sidebar").classList.remove("show");
}

function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("show");
}

function toggleMode(){
  document.body.classList.toggle("light");
  localStorage.setItem("theme", document.body.classList.contains("light") ? "light" : "dark");
}

function openTopic(element){
  let topics = element.parentElement.querySelectorAll(".topic");
  topics.forEach(t=>{
    if(t !== element) t.classList.remove("open");
  });
  element.classList.toggle("open");
}

// --- 35 Minutes Persistent Timer with Beep Sound ---
function initTimer() {
  const TIMER_DURATION = 35 * 60 * 1000; // 35 minutes in milliseconds
  let endTime = localStorage.getItem("timer_end_time");

  if (!endTime) {
    endTime = Date.now() + TIMER_DURATION;
    localStorage.setItem("timer_end_time", endTime);
  } else {
    endTime = parseInt(endTime, 10);
  }

  const timerDisplay = document.getElementById("timer-display");

  function updateTimer() {
    let now = Date.now();
    let timeLeft = endTime - now;

    if (timeLeft <= 0) {
      timerDisplay.innerHTML = "⏱️ Time's Up!";
      playBeepSound();
      alert("35 मिनेट पूरा भयो, भाइ! बिश्राम लेऊ वा अर्को सेसन सुरु गर।");
      // Reset timer for next 35 mins session after alert
      endTime = Date.now() + TIMER_DURATION;
      localStorage.setItem("timer_end_time", endTime);
      return;
    }

    let minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
    let seconds = Math.floor((timeLeft % (1000 * 60)) / 1000);

    // Format numbers to always show 2 digits (e.g., 05:09)
    minutes = minutes < 10 ? "0" + minutes : minutes;
    seconds = seconds < 10 ? "0" + seconds : seconds;

    timerDisplay.innerHTML = `⏱️ ${minutes}:${seconds}`;
  }

  updateTimer();
  setInterval(updateTimer, 1000);
}

// Generate Beep sound using Web Audio API (No external file needed)
function playBeepSound() {
  try {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();

    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    oscillator.type = "sine";
    oscillator.frequency.setValueAtTime(800, audioCtx.currentTime); // Frequency in Hz
    gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime); // Volume

    oscillator.start();
    // Beep for 1 second
    oscillator.stop(audioCtx.currentTime + 1.0);
  } catch (e) {
    console.log("Audio contexts context error or blocked by browser restriction:", e);
  }
}

window.onload=function(){
